appId: com.12oshr.ejoos-plus
productName: ЕЖООС+
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  # Security: exclude any data files that might accidentally end up in project root
  - '!**/*.xlsx'
  - '!**/*.xls'
  - '!**/*.csv'
  - '!**/*.db'
  - '!**/*.sqlite'
  - '!**/*.docx'
  - '!**/*.pdf'
asar: false
win:
  executableName: ejoos-plus
  icon: build/icon.ico
nsis:
  artifactName: EJOOS-Plus-${version}-setup.${ext}
  shortcutName: ЕЖООС+
  uninstallDisplayName: ЕЖООС+
  createDesktopShortcut: always
  oneClick: false
  allowToChangeInstallationDirectory: true
afterPack: ./build/afterPack.cjs
npmRebuild: false
publish:
  provider: github
  owner: hyper1user
  repo: ejoos-plus
  private: true
  releaseType: release
